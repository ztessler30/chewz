function getPhotos(r,d){const k=`${r}||${d}`;if(!PHOTO_DB[k])PHOTO_DB[k]=[];return PHOTO_DB[k];}
function addPhoto(r,d,e){getPhotos(r,d).push(e);}

// ── Helpers ──────────────────────────────────────────────────────────────────
async function callClaude(msg,sys,imgB64=null,imgType=null){
  const content=imgB64?[{type:"image",source:{type:"base64",media_type:imgType,data:imgB64}},{type:"text",text:msg}]:msg;
  const res=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,system:sys,messages:[{role:"user",content}]})});
  const data=await res.json();return data.content?.[0]?.text||"";
}
const toB64=f=>new Promise((ok,no)=>{const r=new FileReader();r.onload=()=>ok(r.result.split(",")[1]);r.onerror=no;r.readAsDataURL(f);});
const toDataURL=f=>new Promise((ok,no)=>{const r=new FileReader();r.onload=()=>ok(r.result);r.onerror=no;r.readAsDataURL(f);});

function requestBrowserLocation(){
  return new Promise((ok,no)=>{
    if(!navigator.geolocation){no(new Error("not_supported"));return;}
    navigator.geolocation.getCurrentPosition(
      pos=>ok({lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy}),
      err=>no(err),
      {enableHighAccuracy:true,timeout:10000}
    );
  });
}

// ── Location Permission Screen ────────────────────────────────────────────────
function LocationPermissionScreen({onAllow, onSkip, T}){
  const [requesting, setRequesting] = useState(false);
  const [error, setError] = useState(null);

  const handleAllow = async () => {
    setRequesting(true); setError(null);
    try {
      const pos = await requestBrowserLocation();
      onAllow(pos);
    } catch(e) {
      if(e.code===1) setError("Location access was denied. You can enable it in your browser settings, or skip for now.");
      else if(e.message==="not_supported") setError("Location isn't supported in this browser.");
      else setError("Couldn't get your location. Please try again.");
      setRequesting(false);
    }
  };

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg,padding:"0 32px",overflowY:"auto",justifyContent:"center"}}>
      {/* Animated location pin */}
      <div style={{textAlign:"center",marginBottom:40}}>
        <div style={{position:"relative",width:100,height:100,margin:"0 auto 24px",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{position:"absolute",inset:0,borderRadius:"50%",background:`${T.orange}15`,animation:"chewz-ping 2s ease-out infinite"}}/>
          <div style={{position:"absolute",inset:10,borderRadius:"50%",background:`${T.orange}22`}}/>
          <span style={{fontSize:44,position:"relative",zIndex:1}}>📍</span>
        </div>
        <p style={{color:T.orange,fontSize:11,fontWeight:800,letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:T.fontBody,marginBottom:10}}>Location Access</p>
        <h2 style={{fontFamily:T.fontDisplay,fontWeight:900,fontSize:28,color:T.text,letterSpacing:"-0.5px",lineHeight:1.2,marginBottom:12}}>
          Find great food<br/><span style={{color:T.orange}}>near you</span>
        </h2>
        <p style={{color:T.subtext,fontSize:14,lineHeight:1.7,fontFamily:T.fontBody}}>
          Chewz uses your location to show restaurants nearby, filter by distance, and tell you how far each spot is from where you are right now.
        </p>
      </div>

      {/* What we use it for */}
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:20,padding:"16px 18px",marginBottom:28}}>
        {[
          {icon:"📏", title:"Distance filtering", desc:"Show only restaurants within your preferred radius"},
          {icon:"🗺️", title:"Nearby discovery", desc:"Surface the best matches closest to you first"},
          {icon:"🚗", title:"Delivery availability", desc:"See which spots deliver to your area"},
        ].map((item,i)=>(
          <div key={i} style={{display:"flex",alignItems:"flex-start",gap:12,padding:i>0?"12px 0 0":0,borderTop:i>0?`1px solid ${T.border}`:"none",marginTop:i>0?12:0}}>
            <span style={{fontSize:22,flexShrink:0,marginTop:2}}>{item.icon}</span>
            <div>
              <p style={{color:T.text,fontWeight:700,fontSize:14,fontFamily:T.fontBody,marginBottom:2}}>{item.title}</p>
              <p style={{color:T.muted,fontSize:12,fontFamily:T.fontBody,lineHeight:1.4}}>{item.desc}</p>
            </div>
          </div>
        ))}
      </div>

      {/* Privacy note */}
      <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:24,background:`${T.green}11`,border:`1px solid ${T.green}33`,borderRadius:14,padding:"12px 14px"}}>
        <span style={{fontSize:16,flexShrink:0}}>🔒</span>
        <p style={{color:T.green,fontSize:12,fontFamily:T.fontBody,lineHeight:1.5}}>Your location is only used to find nearby restaurants. It is never stored on our servers or shared with third parties.</p>
      </div>

      {error&&<div style={{background:T.errBg,border:`1px solid ${T.errBd}`,borderRadius:12,padding:"10px 14px",marginBottom:16}}><p style={{color:"#FF5555",fontSize:13,fontFamily:T.fontBody}}>{error}</p></div>}

      <div style={{display:"flex",flexDirection:"column",gap:10,paddingBottom:32}}>
        <Btn T={T} onClick={handleAllow} disabled={requesting}>
          {requesting?"Getting your location…":"📍 Allow Location Access"}
        </Btn>
        <Btn T={T} variant="ghost" onClick={onSkip}>Skip for Now</Btn>
      </div>
    </div>
  );
}

// ── Paywall Modal ─────────────────────────────────────────────────────────────
function PaywallModal({T,user,setUser,onClose,highlightPlan="pro",reason=null}){
  const [selected,setSelected]=useState(highlightPlan);
  const [billing,setBilling]=useState("monthly");
  const [success,setSuccess]=useState(false);
  const currentPlan=user.plan||"free";
  const getPrice=(pid)=>{
    if(pid==="free")return{display:"$0",sub:""};
    const base=pid==="pro"?6.99:12.99;
    if(billing==="yearly")return{display:`$${(base*0.75).toFixed(2)}`,sub:`$${(base*0.75*12).toFixed(0)}/yr · save 25%`};
    return{display:`$${base.toFixed(2)}`,sub:"billed monthly"};
  };
  const handleSubscribe=()=>{
    if(selected===currentPlan){onClose();return;}
    const updated={...user,plan:selected};
    if(ACCOUNTS[user.email])ACCOUNTS[user.email].plan=selected;
    setUser(updated);setSuccess(true);setTimeout(()=>onClose(),1800);
  };
  return(
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.88)",zIndex:200,display:"flex",alignItems:"flex-end"}}>
      <div style={{background:T.bg,borderRadius:"28px 28px 0 0",width:"100%",maxHeight:"92%",overflowY:"auto",paddingBottom:32}}>
        <div style={{padding:"16px 24px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{width:36,height:4,background:T.border,borderRadius:2}}/>
          <button onClick={onClose} style={{background:T.card2,border:`1px solid ${T.border}`,borderRadius:10,padding:"5px 11px",color:T.muted,fontSize:13,cursor:"pointer",fontFamily:T.fontBody}}>✕</button>
        </div>
        {success?(
          <div style={{textAlign:"center",padding:"48px 32px"}}>
            <div style={{fontSize:56,marginBottom:16}}>🎉</div>
            <h2 style={{fontFamily:T.fontDisplay,fontWeight:900,fontSize:26,color:T.text,marginBottom:8}}>You're on {PLANS[selected].name}!</h2>
            <p style={{color:T.muted,fontSize:14,fontFamily:T.fontBody}}>Enjoy your upgraded Chewz experience.</p>
          </div>
        ):(
          <>
            <div style={{padding:"20px 24px 16px",textAlign:"center"}}>
              {reason&&<p style={{color:T.orange,fontSize:12,fontWeight:800,letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:T.fontBody,marginBottom:8}}>{reason}</p>}
              <h2 style={{fontFamily:T.fontDisplay,fontWeight:900,fontSize:26,color:T.text,letterSpacing:"-0.5px",lineHeight:1.2,marginBottom:6}}>Upgrade Chewz.<br/><span style={{color:T.orange}}>Eat better, every time.</span></h2>
              <p style={{color:T.muted,fontSize:13,fontFamily:T.fontBody}}>Choose the plan that fits your lifestyle.</p>
            </div>
            <div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
              <div style={{display:"flex",background:T.card2,borderRadius:99,padding:4}}>
                {["monthly","yearly"].map(b=>(
                  <button key={b} onClick={()=>setBilling(b)} style={{padding:"7px 18px",borderRadius:99,border:"none",background:billing===b?T.orange:"transparent",color:billing===b?"#fff":T.muted,fontSize:12,fontWeight:700,fontFamily:T.fontBody,cursor:"pointer",transition:"all 0.2s"}}>
                    {b==="monthly"?"Monthly":"Yearly"}{b==="yearly"&&<span style={{marginLeft:5,fontSize:10,background:"rgba(255,255,255,0.2)",padding:"1px 6px",borderRadius:99}}>-25%</span>}
                  </button>
                ))}
              </div>
            </div>
            <div style={{padding:"0 20px",display:"flex",flexDirection:"column",gap:12}}>
              {["free","pro","premium"].map(pid=>{
                const plan=PLANS[pid];const pricing=getPrice(pid);
                const isCurrent=pid===currentPlan;const isSelected=pid===selected;
                return(
                  <div key={pid} onClick={()=>setSelected(pid)} style={{borderRadius:20,border:`2px solid ${isSelected?plan.color:T.border}`,background:isSelected?`${plan.color}11`:T.card,cursor:"pointer",overflow:"hidden",transition:"all 0.2s",position:"relative"}}>
                    {plan.badge&&!isCurrent&&<div style={{position:"absolute",top:12,right:12,background:plan.color,color:"#fff",fontSize:10,fontWeight:800,padding:"3px 10px",borderRadius:99,fontFamily:T.fontBody}}>{plan.badge}</div>}
                    {isCurrent&&<div style={{position:"absolute",top:12,right:12,background:T.card2,color:T.muted,fontSize:10,fontWeight:800,padding:"3px 10px",borderRadius:99,fontFamily:T.fontBody}}>Current</div>}
                    <div style={{padding:"16px 18px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                        <div style={{width:32,height:32,borderRadius:10,background:isSelected?plan.color:T.card2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{pid==="free"?"🆓":pid==="pro"?"⚡":"👑"}</div>
                        <div style={{flex:1}}>
                          <p style={{color:T.text,fontWeight:800,fontSize:15,fontFamily:T.fontBody}}>{plan.name}</p>
                          <p style={{color:T.muted,fontSize:11,fontFamily:T.fontBody}}>{plan.label}</p>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <p style={{color:isSelected?plan.color:T.text,fontFamily:T.fontDisplay,fontWeight:900,fontSize:20}}>{pricing.display}<span style={{fontSize:12,fontWeight:600,color:T.muted}}>{pid!=="free"&&(billing==="yearly"?"/mo":plan.period)}</span></p>
                          {pricing.sub&&<p style={{color:T.muted,fontSize:10,fontFamily:T.fontBody}}>{pricing.sub}</p>}
                        </div>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:5}}>
                        {plan.features.filter((_,i)=>isSelected||i<3).map((f,i)=>(
                          <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontSize:13,flexShrink:0,color:f.included?(isSelected?plan.color:T.green):"#444"}}>{f.included?"✓":"✕"}</span>
                            <p style={{color:f.included?T.subtext:T.border,fontSize:12,fontFamily:T.fontBody,textDecoration:f.included?"none":"line-through"}}>{f.text}</p>
                          </div>
                        ))}
                        {!isSelected&&plan.features.length>3&&<p style={{color:T.muted,fontSize:11,fontFamily:T.fontBody,marginTop:2}}>+{plan.features.length-3} more features…</p>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{padding:"20px 20px 0"}}>
              <Btn T={T} onClick={handleSubscribe} style={{background:selected==="premium"?PLANS.premium.color:selected==="pro"?PLANS.pro.color:T.card2,color:selected==="free"?T.muted:"#fff",border:"none"}}>
                {selected===currentPlan?"Keep Current Plan":selected==="free"?"Downgrade to Free":`Start ${PLANS[selected].name} ${billing==="yearly"?"(Save 25%)":""}→`}
              </Btn>
              {selected!=="free"&&<p style={{textAlign:"center",color:T.muted,fontSize:11,fontFamily:T.fontBody,marginTop:10}}>Cancel anytime. No commitment.</p>}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── Scan Limit Banner ─────────────────────────────────────────────────────────
function ScanLimitBanner({user,T,onUpgrade}){
  const plan=PLANS[user.plan||"free"];const used=user.scansUsed||0;const limit=plan.scanLimit;
  if(limit===Infinity)return null;
  const remaining=Math.max(0,limit-used);const urgent=remaining<=1;
  return(
    <div style={{margin:"0 24px 16px",background:urgent?`${T.orange}15`:T.card,border:`1px solid ${urgent?T.orange:T.border}`,borderRadius:14,padding:"12px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <p style={{color:urgent?T.orange:T.text,fontSize:13,fontWeight:700,fontFamily:T.fontBody}}>{remaining===0?"No scans left this month":`${remaining} scan${remaining!==1?"s":""} remaining`}</p>

// ── Welcome / Auth ─────────────────────────────────────────────────────────────
function WelcomeScreen({onAuth,T}){
  const [mode,setMode]=useState("welcome");
  const [form,setForm]=useState({name:"",email:"",password:""});
  const [error,setError]=useState("");
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const handleSignUp=()=>{
    if(!form.name.trim()||!form.email.trim()||!form.password.trim()){setError("Please fill in all fields.");return;}
    if(ACCOUNTS[form.email]){setError("An account with that email already exists.");return;}
    ACCOUNTS[form.email]={name:form.name,password:form.password,plan:"free",scansUsed:0,profile:{goals:[],dietary:[],cuisines:[],favDishes:[],priceRange:[],maxDistance:999,services:[]}};
    onAuth({email:form.email,name:form.name,isNew:true,plan:"free",scansUsed:0,profile:ACCOUNTS[form.email].profile});
  };
  const handleSignIn=()=>{
    const a=ACCOUNTS[form.email];
    if(!a||a.password!==form.password){setError("Invalid email or password.");return;}
    onAuth({email:form.email,name:a.name,isNew:false,plan:a.plan||"free",scansUsed:a.scansUsed||0,profile:a.profile});
  };
  if(mode==="welcome")return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-80,right:-80,width:280,height:280,borderRadius:"50%",background:`radial-gradient(circle,${T.orange}22 0%,transparent 70%)`,pointerEvents:"none"}}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",padding:"0 32px"}}>
        <div style={{marginBottom:48}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <div style={{width:44,height:44,borderRadius:14,background:T.orange,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,boxShadow:`0 0 24px ${T.orange}66`}}>🍽️</div>
            <span style={{fontFamily:T.fontDisplay,fontWeight:900,fontSize:36,color:T.text,letterSpacing:"-1px"}}>chewz</span>
          </div>
          <div style={{width:40,height:3,background:T.orange,borderRadius:2}}/>
        </div>
        <h1 style={{fontFamily:T.fontDisplay,fontWeight:900,fontSize:38,color:T.text,lineHeight:1.1,marginBottom:14,letterSpacing:"-1px"}}>Eat smarter.<br/><span style={{color:T.orange}}>Every meal.</span></h1>
        <p style={{color:T.subtext,fontSize:15,lineHeight:1.6,fontFamily:T.fontBody,marginBottom:48}}>Scan any menu, get personalized dish recs, and discover restaurants near you matched to your goals and budget.</p>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Btn T={T} onClick={()=>setMode("signup")}>Create Account</Btn>
          <Btn T={T} variant="ghost" onClick={()=>setMode("signin")}>Sign In</Btn>
        </div>
      </div>
      <p style={{textAlign:"center",color:T.border,fontSize:11,fontFamily:T.fontBody,padding:"16px 32px 32px"}}>By continuing you agree to Chewz's Terms & Privacy Policy</p>
    </div>
  );
  const isUp=mode==="signup";
  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg,padding:"0 28px",overflowY:"auto"}}>
      <button onClick={()=>{setMode("welcome");setError("");}} style={{background:"none",border:"none",color:T.muted,fontSize:24,cursor:"pointer",textAlign:"left",padding:"20px 0 8px",fontFamily:T.fontBody}}>←</button>
      <div style={{paddingTop:16,paddingBottom:40}}>
        <p style={{color:T.orange,fontSize:11,fontWeight:800,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8,fontFamily:T.fontBody}}>{isUp?"Get Started":"Welcome Back"}</p>
        <h2 style={{fontFamily:T.fontDisplay,fontWeight:900,fontSize:30,color:T.text,letterSpacing:"-0.5px",marginBottom:28}}>{isUp?"Create your account":"Sign back in"}</h2>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {isUp&&<div><SLbl T={T}>Your Name</SLbl><Inp T={T} value={form.name} onChange={e=>set("name",e.target.value)} placeholder="e.g. Jordan"/></div>}

// ── Onboarding ────────────────────────────────────────────────────────────────
function OnboardingScreen({user,onComplete,T}){
  const [step,setStep]=useState(0);
  const [prefs,setPrefs]=useState({goals:[],dietary:[],cuisines:[],favDishes:[],priceRange:[],maxDistance:999,services:[]});
  const toggle=(field,val)=>setPrefs(p=>({...p,[field]:Array.isArray(p[field])?p[field].includes(val)?p[field].filter(x=>x!==val):[...p[field],val]:val}));

  const steps=[
    {label:"Health Goals",title:`What are you
eating for, ${user.name.split(" ")[0]}?`,sub:"Pick everything that applies.",field:"goals",items:HEALTH_GOALS,accent:T.orange,type:"multi"},
    {label:"Dietary Needs",title:"Any restrictions
or preferences?",sub:"We'll keep these in mind always.",field:"dietary",items:DIETARY_PREFS,accent:T.green,type:"multi"},
    {label:"Favorite Cuisines",title:"What cuisines
do you love?",sub:"We'll prioritize these in Discover.",field:"cuisines",items:CUISINES,accent:T.orange,type:"multi"},
    {label:"Favorite Dishes",title:"Any go-to dishes
you always order?",sub:"We'll find the best spots for these.",field:"favDishes",items:FAV_DISHES,accent:T.purple,type:"multi"},
    {label:"Budget",title:"What's your
price range?",sub:"We'll match restaurants to your budget.",field:"priceRange",items:PRICE_RANGES.map(p=>`${p.label} ${p.desc}`),accent:T.gold,type:"multi"},
    {label:"Distance",title:"How far are you
willing to go?",sub:"We'll only show restaurants within this radius.",field:"maxDistance",items:DISTANCE_OPTIONS,accent:T.green,type:"single"},
    {label:"How You Eat",title:"How do you prefer
to get your food?",sub:"Select all that apply.",field:"services",items:SERVICE_OPTIONS,accent:T.orange,type:"multi_service"},
  ];

  const cur=steps[step];
  const handleNext=()=>{
    if(step<steps.length-1){setStep(s=>s+1);return;}
    if(ACCOUNTS[user.email])ACCOUNTS[user.email].profile=prefs;
    onComplete({...user,profile:prefs});
  };

  const isSelected=(item)=>{
    if(cur.type==="single")return prefs[cur.field]===(typeof item==="object"?item.value:item);
    if(cur.type==="multi_service")return prefs[cur.field].includes(item.id);
    return prefs[cur.field].includes(item);
  };
  const handleToggle=(item)=>{
    if(cur.type==="single"){setPrefs(p=>({...p,[cur.field]:typeof item==="object"?item.value:item}));return;}
    if(cur.type==="multi_service"){toggle(cur.field,item.id);return;}
    toggle(cur.field,item);
  };
  const getLabel=(item)=>typeof item==="object"?(item.label||item.desc):item;
  const getIcon=(item)=>typeof item==="object"&&item.icon?item.icon:null;
  const selectedCount=cur.type==="single"?(prefs[cur.field]!==999&&prefs[cur.field]!==undefined?1:0):prefs[cur.field]?.length||0;

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg}}>
      <div style={{height:3,background:T.border}}><div style={{height:"100%",width:`${((step+1)/steps.length)*100}%`,background:T.orange,transition:"width 0.4s ease",borderRadius:2}}/></div>
      <div style={{flex:1,overflowY:"auto",padding:"24px 28px 0"}}>
        <div style={{display:"flex",gap:5,marginBottom:24}}>{steps.map((_,i)=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=step?T.orange:T.border,transition:"background 0.3s"}}/>)}</div>
        <p style={{color:cur.accent,fontSize:11,fontWeight:800,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8,fontFamily:T.fontBody}}>Step {step+1} of {steps.length} · {cur.label}</p>
        <h2 style={{fontFamily:T.fontDisplay,fontWeight:900,fontSize:28,color:T.text,lineHeight:1.2,marginBottom:8,letterSpacing:"-0.5px",whiteSpace:"pre-line"}}>{cur.title}</h2>
        <p style={{color:T.subtext,fontSize:13,marginBottom:24,fontFamily:T.fontBody}}>{cur.sub}</p>

        {cur.type==="single"?(
          // Distance — single select with visual cards
          <div style={{display:"flex",flexWrap:"wrap",gap:10,paddingBottom:32}}>
            {DISTANCE_OPTIONS.map(opt=>{
              const sel=prefs.maxDistance===opt.value;
              return(
                <button key={opt.value} onClick={()=>setPrefs(p=>({...p,maxDistance:opt.value}))} style={{flex:"1 1 calc(33% - 10px)",minWidth:80,padding:"14px 8px",borderRadius:16,border:`2px solid ${sel?cur.accent:T.border}`,background:sel?`${cur.accent}18`:T.card,cursor:"pointer",transition:"all 0.15s"}}>
                  <p style={{color:sel?cur.accent:T.text,fontWeight:800,fontSize:16,fontFamily:T.fontDisplay,marginBottom:2}}>{opt.label}</p>
                  <p style={{color:T.muted,fontSize:10,fontFamily:T.fontBody}}>{opt.value===999?"No limit":"radius"}</p>
                </button>
              );
            })}
          </div>
        ):cur.type==="multi_service"?(
          // Service options — icon cards
          <div style={{display:"flex",flexDirection:"column",gap:10,paddingBottom:32}}>
            {SERVICE_OPTIONS.map(opt=>{
              const sel=prefs.services.includes(opt.id);
              return(
                <button key={opt.id} onClick={()=>toggle("services",opt.id)} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",borderRadius:16,border:`2px solid ${sel?cur.accent:T.border}`,background:sel?`${cur.accent}18`:T.card,cursor:"pointer",transition:"all 0.15s",textAlign:"left"}}>
                  <span style={{fontSize:28,flexShrink:0}}>{opt.icon}</span>
                  <div style={{flex:1}}>
                    <p style={{color:sel?cur.accent:T.text,fontWeight:800,fontSize:15,fontFamily:T.fontBody}}>{opt.label}</p>
                    <p style={{color:T.muted,fontSize:12,fontFamily:T.fontBody}}>
                      {opt.id==="dine_in"&&"Eating at the restaurant"}
                      {opt.id==="takeout"&&"Pick up your order yourself"}
                      {opt.id==="delivery"&&"Direct delivery from the restaurant"}
                      {opt.id==="doordash"&&"Order through DoorDash"}
                      {opt.id==="ubereats"&&"Order through Uber Eats"}
                    </p>
                  </div>
                  <div style={{width:22,height:22,borderRadius:"50%",border:`2px solid ${sel?cur.accent:T.border}`,background:sel?cur.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    {sel&&<span style={{color:"#fff",fontSize:12,fontWeight:800}}>✓</span>}
                  </div>
                </button>
              );
            })}
          </div>
        ):(
          <div style={{display:"flex",flexWrap:"wrap",gap:8,paddingBottom:32}}>
            {cur.items.map(item=><Pill key={getLabel(item)} label={getLabel(item)} icon={getIcon(item)} selected={isSelected(item)} onClick={()=>handleToggle(item)} T={T} accent={cur.accent}/>)}
          </div>
        )}
      </div>
      <div style={{padding:"16px 28px 28px",borderTop:`1px solid ${T.border}`,background:T.bg}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{color:T.muted,fontSize:12,fontFamily:T.fontBody}}>{cur.type==="single"?(prefs.maxDistance!==999?`Within ${prefs.maxDistance} mi`:"Any distance"):`${selectedCount} selected`}</span>
          {selectedCount===0&&cur.type!=="single"&&<span style={{color:T.muted,fontSize:12,fontFamily:T.fontBody}}>You can skip this</span>}
        </div>
        <Btn T={T} onClick={handleNext} style={{background:cur.accent}}>{step<steps.length-1?"Continue →":"Start Chewing 🍽️"}</Btn>
      </div>
    </div>
  );
}

                <Pill key={opt.value} label={opt.label} selected={profile.maxDistance===opt.value} onClick={()=>setField("maxDistance",opt.value)} T={T} accent={T.green} small/>
              ))}
            </div>
          </>
        )}
      </div>

      {/* Service preferences */}
      <div style={{margin:"0 24px 16px",background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:"14px 16px"}}>
        <SLbl T={T}>How You Eat</SLbl>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {SERVICE_OPTIONS.map(opt=>{
            const sel=(profile.services||[]).includes(opt.id);
            return(
              <button key={opt.id} onClick={()=>toggle("services",opt.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:12,border:`1.5px solid ${sel?T.orange:T.border}`,background:sel?`${T.orange}11`:"transparent",cursor:"pointer",transition:"all 0.15s",textAlign:"left"}}>
                <span style={{fontSize:20,flexShrink:0}}>{opt.icon}</span>
                <p style={{flex:1,color:sel?T.orange:T.text,fontWeight:sel?700:500,fontSize:13,fontFamily:T.fontBody}}>{opt.label}</p>
                {sel&&<span style={{color:T.orange,fontSize:14,fontWeight:800}}>✓</span>}
              </button>
            );
          })}
        </div>
      </div>

      {/* Dark mode */}
      <div style={{margin:"0 24px 20px",background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><p style={{color:T.text,fontWeight:700,fontSize:14,fontFamily:T.fontBody}}>Appearance</p><p style={{color:T.muted,fontSize:12,fontFamily:T.fontBody}}>{darkMode?"Dark Mode":"Light Mode"}</p></div>
        <button onClick={()=>setDarkMode(d=>!d)} style={{width:52,height:28,borderRadius:99,background:darkMode?T.orange:T.border,border:"none",cursor:"pointer",position:"relative",transition:"background 0.25s",flexShrink:0}}>
          <div style={{position:"absolute",top:3,left:darkMode?26:3,width:22,height:22,borderRadius:"50%",background:"#fff",transition:"left 0.25s",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>{darkMode?"🌙":"☀️"}</div>
        </button>
      </div>

      {sections.map(s=>(
        <div key={s.field} style={{padding:"0 24px 24px"}}>
          <SLbl T={T}>{s.label}</SLbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{s.items.map(item=><Pill key={item} label={item} selected={(profile[s.field]||[]).includes(item)} onClick={()=>toggle(s.field,item)} T={T} accent={s.accent}/>)}</div>
        </div>
      ))}
      <div style={{height:24}}/>
    </Screen>
  );
}

// ── Scan Screen ───────────────────────────────────────────────────────────────
function ScanScreen({user,setUser,T,onUpgrade}){
  const profile=user.profile;
  const [phase,setPhase]=useState("idle");
  const [result,setResult]=useState(null);
  const [imgPreview,setImgPreview]=useState(null);
  const [error,setError]=useState(null);
  const [photoModal,setPhotoModal]=useState(null);
  const fileRef=useRef();
  const plan=PLANS[user.plan||"free"];
  const scansUsed=user.scansUsed||0;
  const atLimit=plan.scanLimit!==Infinity&&scansUsed>=plan.scanLimit;
  const isPro=(user.plan==="pro"||user.plan==="premium");

  const handleFile=useCallback(async(file)=>{
    if(!file)return;
    if(atLimit){onUpgrade("scan_limit");return;}
    setError(null);setImgPreview(URL.createObjectURL(file));setPhase("scanning");
    const newCount=scansUsed+1;
    if(ACCOUNTS[user.email])ACCOUNTS[user.email].scansUsed=newCount;
    setUser(u=>({...u,scansUsed:newCount}));
    try{
      const b64=await toB64(file);const mtype=file.type||"image/jpeg";
      const budget=profile.priceRange?.length>0?`, Budget: ${profile.priceRange.join(", ")}`:"";
      const services=profile.services?.length>0?`, Preferred ordering: ${profile.services.join(", ")}`:"";
      const pStr=`Goals:${profile.goals.join(",")||"balanced"}, Restrictions:${profile.dietary.join(",")||"none"}, Fav dishes:${profile.favDishes?.join(",")||"none"}${budget}${services}`;
      const sys=`You are a world-class nutritionist and foodie. Analyze menus and give personalized dish recommendations. Always respond with valid JSON only, no markdown.`;
      const msg=`Menu image. User: ${pStr}. Return JSON:
{"top_pick":{"dish":"name","why":"2-sentence reason","macros":${isPro?'{"calories":450,"protein":"32g","carbs":"28g","fat":"18g"}':'null'},"price":"$18","score":95,"tags":["High Protein","Good Value"]},"alternatives":[{"dish":"name","why":"reason","price":"$12","score":82},{"dish":"name","why":"reason","price":"$22","score":76}],"avoid":["dish — reason"],"summary":"One punchy sentence about this menu for their goals"}`;
      const raw=await callClaude(msg,sys,b64,mtype);
      setResult(JSON.parse(raw.replace(/```json|```/g,"").trim()));setPhase("results");
    }catch{setError("Couldn't read the menu — try a clearer photo.");setPhase("idle");}
  },[profile,user,atLimit,scansUsed,setUser,onUpgrade,isPro]);

  const reset=()=>{setPhase("idle");setResult(null);setImgPreview(null);setError(null);};

  if(phase==="scanning")return(
    <Screen T={T} style={{alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center",padding:"0 32px"}}>
        {imgPreview&&<img src={imgPreview} alt="menu" style={{width:160,height:200,objectFit:"cover",borderRadius:20,marginBottom:32,opacity:0.5}}/>}
        <div style={{position:"relative",width:56,height:56,margin:"0 auto 20px"}}>
          <div style={{position:"absolute",inset:0,borderRadius:"50%",border:`2px solid ${T.orange}`,animation:"chewz-ping 1.4s ease-out infinite",opacity:0.3}}/>
          <div style={{position:"absolute",inset:4,borderRadius:"50%",border:`2px solid ${T.orange}`,borderTopColor:"transparent",animation:"chewz-spin 0.9s linear infinite"}}/>
          <span style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🍽️</span>
        </div>
        <p style={{fontFamily:T.fontDisplay,fontWeight:900,fontSize:22,color:T.text,marginBottom:8}}>Reading the Menu</p>
        <p style={{color:T.muted,fontSize:14,fontFamily:T.fontBody}}>Analyzing dishes & matching to your goals…</p>
      </div>
    </Screen>
  );

  if(phase==="results"&&result)return(
    <Screen T={T}>
      {photoModal&&<PhotoLibraryModal restaurant={photoModal.r} dish={photoModal.d} T={T} user={user} onClose={()=>setPhotoModal(null)}/>}
      <div style={{padding:"20px 24px 16px",display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
        <div><p style={{color:T.orange,fontSize:11,fontWeight:800,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4,fontFamily:T.fontBody}}>Your Order</p><h1 style={{fontFamily:T.fontDisplay,fontWeight:900,fontSize:24,color:T.text,letterSpacing:"-0.5px"}}>We found your dish.</h1></div>
        <button onClick={reset} style={{background:T.card2,border:`1px solid ${T.border}`,borderRadius:10,padding:"7px 14px",color:T.muted,fontSize:12,fontFamily:T.fontBody,cursor:"pointer"}}>New Scan</button>
      </div>
      {imgPreview&&(<div style={{margin:"0 24px 16px",borderRadius:18,overflow:"hidden",height:130,position:"relative"}}><img src={imgPreview} alt="menu" style={{width:"100%",height:"100%",objectFit:"cover",opacity:0.45}}/><div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,0.9),transparent)"}}/><p style={{position:"absolute",bottom:12,left:16,color:"#ccc",fontSize:12,fontFamily:T.fontBody,fontWeight:600}}>{result.summary}</p></div>)}
      <div style={{margin:"0 24px 16px",background:`linear-gradient(135deg,${T.orange},#CC3300)`,borderRadius:20,padding:"20px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-30,right:-30,width:120,height:120,borderRadius:"50%",background:"rgba(255,255,255,0.07)"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div><span style={{background:"rgba(255,255,255,0.2)",color:"#fff",fontSize:10,fontWeight:800,padding:"3px 10px",borderRadius:99,letterSpacing:"0.08em",fontFamily:T.fontBody}}>⭐ TOP PICK</span><h2 style={{fontFamily:T.fontDisplay,fontWeight:900,fontSize:22,color:"#fff",marginTop:8,letterSpacing:"-0.3px"}}>{result.top_pick.dish}</h2></div>
          <div style={{textAlign:"right"}}><div style={{fontFamily:T.fontDisplay,fontWeight:900,fontSize:32,color:"#fff",lineHeight:1}}>{result.top_pick.score}</div><div style={{color:"rgba(255,255,255,0.6)",fontSize:11,fontFamily:T.fontBody}}>match</div></div>
        </div>
        <p style={{color:"rgba(255,255,255,0.85)",fontSize:13,lineHeight:1.6,marginBottom:12,fontFamily:T.fontBody}}>{result.top_pick.why}</p>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:result.top_pick.macros?14:6}}>
          {result.top_pick.price&&<span style={{background:"rgba(255,255,255,0.25)",color:"#fff",fontSize:11,fontWeight:800,padding:"3px 10px",borderRadius:99,fontFamily:T.fontBody}}>💰 {result.top_pick.price}</span>}
          {result.top_pick.tags?.map(t=><span key={t} style={{background:"rgba(255,255,255,0.18)",color:"#fff",fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:99,fontFamily:T.fontBody}}>{t}</span>)}
        </div>
        {result.top_pick.macros?(<div style={{display:"flex",gap:8,background:"rgba(0,0,0,0.22)",borderRadius:14,padding:"12px",marginBottom:10}}>{Object.entries(result.top_pick.macros).map(([k,v])=><div key={k} style={{flex:1,textAlign:"center"}}><div style={{fontWeight:800,fontSize:14,color:"#fff",fontFamily:T.fontBody}}>{v}</div><div style={{color:"rgba(255,255,255,0.55)",fontSize:10,textTransform:"capitalize",fontFamily:T.fontBody}}>{k}</div></div>)}</div>
        ):(<button onClick={()=>onUpgrade("macros")} style={{marginBottom:10,width:"100%",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:12,padding:"9px",color:"#fff",fontSize:12,fontWeight:700,fontFamily:T.fontBody,cursor:"pointer"}}>⚡ Upgrade for Full Nutrition Breakdown</button>)}
        <button onClick={()=>setPhotoModal({r:"Scanned Menu",d:result.top_pick.dish})} style={{width:"100%",background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:12,padding:"9px",color:"#fff",fontSize:12,fontWeight:700,fontFamily:T.fontBody,cursor:"pointer"}}>📷 View / Add Photos of this Dish</button>
      </div>
      {result.alternatives?.length>0&&(<div style={{padding:"0 24px 16px"}}><SLbl T={T}>Also Consider</SLbl>{result.alternatives.map((a,i)=>(<div key={i} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:"14px",display:"flex",alignItems:"center",gap:12,marginBottom:10}}><div style={{width:40,height:40,borderRadius:12,background:T.card2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{["🥗","🍜","🥩"][i]||"🍽️"}</div><div style={{flex:1}}><p style={{color:T.text,fontWeight:700,fontSize:14,fontFamily:T.fontBody}}>{a.dish}</p><p style={{color:T.muted,fontSize:12,fontFamily:T.fontBody}}>{a.why}</p></div><div style={{textAlign:"right",flexShrink:0}}>{a.price&&<p style={{color:T.gold,fontSize:12,fontWeight:700,fontFamily:T.fontBody}}>{a.price}</p>}<p style={{color:T.orange,fontWeight:800,fontSize:14,fontFamily:T.fontBody}}>{a.score}</p></div></div>))}</div>)}
      {result.avoid?.length>0&&(<div style={{padding:"0 24px 28px"}}><SLbl T={T}>Skip These</SLbl><div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:"14px"}}>{result.avoid.map((d,i)=><p key={i} style={{color:T.subtext,fontSize:13,fontFamily:T.fontBody,padding:"3px 0",display:"flex",alignItems:"flex-start",gap:8}}><span style={{color:"#FF4444",fontWeight:800,flexShrink:0}}>✕</span>{d}</p>)}</div></div>)}
    </Screen>
  );

  return(
    <Screen T={T} style={{alignItems:"center",justifyContent:"center"}}>
      <div style={{padding:"0 32px",textAlign:"center",width:"100%"}}>
        <div style={{width:90,height:90,background:T.card,border:`2px dashed ${atLimit?T.orange:T.border}`,borderRadius:28,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 24px",fontSize:38}}>{atLimit?"🔒":"📷"}</div>
        <h1 style={{fontFamily:T.fontDisplay,fontWeight:900,fontSize:30,color:T.text,marginBottom:10,letterSpacing:"-0.5px",lineHeight:1.15}}>{atLimit?"Scan Limit
Reached":"Scan Any
Menu"}</h1>
        <p style={{color:T.subtext,fontSize:14,lineHeight:1.6,fontFamily:T.fontBody,marginBottom:24}}>{atLimit?"You've used all 5 free scans this month. Upgrade to Pro for unlimited scans.":"Take a photo of any restaurant menu and get instant personalized recommendations."}</p>
        <ScanLimitBanner user={user} T={T} onUpgrade={()=>onUpgrade("scan_limit")}/>
        {error&&<div style={{background:T.errBg,border:`1px solid ${T.errBd}`,borderRadius:12,padding:"10px 14px",marginBottom:16,color:"#FF5555",fontSize:13,fontFamily:T.fontBody}}>{error}</div>}
        <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>handleFile(e.target.files?.[0])}/>
        {atLimit?<Btn T={T} onClick={()=>onUpgrade("scan_limit")} style={{marginBottom:12}}>⚡ Upgrade to Unlimited Scans</Btn>:<><Btn T={T} onClick={()=>fileRef.current?.click()} style={{marginBottom:12}}>📸 Scan Menu</Btn><Btn T={T} variant="ghost" onClick={()=>fileRef.current?.click()}>Upload from Library</Btn></>}
      </div>

// ── Discover Screen ────────────────────────────────────────────────────────────
function DiscoverScreen({user,T,onUpgrade,location}){
  const profile=user.profile;
  const [query,setQuery]=useState("");
  const [loading,setLoading]=useState(false);
  const [aiRecs,setAiRecs]=useState(null);
  const [error,setError]=useState(null);
  const [priceFilter,setPriceFilter]=useState([]);
  const [distFilter,setDistFilter]=useState(profile.maxDistance||999);
  const [serviceFilter,setServiceFilter]=useState(profile.services||[]);
  const [photoModal,setPhotoModal]=useState(null);
  const isPro=(user.plan==="pro"||user.plan==="premium");

  const toggleService=s=>setServiceFilter(f=>f.includes(s)?f.filter(x=>x!==s):[...f,s]);
  const togglePrice=p=>setPriceFilter(f=>f.includes(p)?f.filter(x=>x!==p):[...f,p]);

  const getAIRecs=async()=>{
    setLoading(true);setError(null);
    try{
      const activePrices=priceFilter.length>0?priceFilter:(profile.priceRange||[]);
      const budgetStr=activePrices.length>0?activePrices.join(", "):"any budget";
      const distStr=distFilter===999?"any distance":`within ${distFilter} mile${distFilter!==1?"s":""}`;
      const svcStr=serviceFilter.length>0?serviceFilter.join(", "):"any";
      const locationStr=location?`, near coordinates ${location.lat.toFixed(4)},${location.lng.toFixed(4)}`:"";
      const sys=`You are a top food critic and nutritionist. Respond only with valid JSON, no markdown.`;
      const pStr=`Goals:${profile.goals.join(",")||"balanced"}, Restrictions:${profile.dietary.join(",")||"none"}, Cuisines:${profile.cuisines.join(",")||"any"}, Fav dishes:${profile.favDishes?.join(",")||"none"}, Budget:${budgetStr}, Distance:${distStr}, Services:${svcStr}${locationStr}`;
      const msg=`User: ${pStr}. Search: "${query||"best meals for my goals"}".
Suggest 4 restaurants matching budget (${budgetStr}), distance (${distStr}), and available via ${svcStr}. Return JSON:
{"headline":"punchy 5-word headline","restaurants":[{"name":"Restaurant","cuisine":"Type","dish":"Specific Dish","why":"1 sentence including price value","emoji":"🍣","match":94,"vibe":"Casual","price":"$$","approxPrice":"$28","distance":"0.4 mi","services":["dine_in","takeout","doordash"]}]}`;
      const raw=await callClaude(msg,sys);
      setAiRecs(JSON.parse(raw.replace(/```json|```/g,"").trim()));
    }catch{setError("Couldn't load recs — try again.");}
    setLoading(false);
  };

  const restaurants=aiRecs?.restaurants||SAMPLE_RESTAURANTS;

  return(
    <Screen T={T}>
      {photoModal&&<PhotoLibraryModal restaurant={photoModal.r} dish={photoModal.d} T={T} user={user} onClose={()=>setPhotoModal(null)}/>}

      <div style={{padding:"20px 24px 14px"}}>
        <p style={{color:T.orange,fontSize:11,fontWeight:800,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4,fontFamily:T.fontBody}}>Discover</p>
        <h1 style={{fontFamily:T.fontDisplay,fontWeight:900,fontSize:26,color:T.text,letterSpacing:"-0.5px",marginBottom:14,lineHeight:1.2}}>
          {aiRecs?.headline||`What's calling
your name, ${user.name.split(" ")[0]}?`}
        </h1>

        {/* Search */}
        <div style={{display:"flex",gap:10,marginBottom:14}}>
          <Inp T={T} value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&getAIRecs()} placeholder="e.g. high protein, sushi, under $20…" style={{padding:"11px 14px"}}/>
          <button onClick={getAIRecs} disabled={loading} style={{background:T.orange,color:"#fff",border:"none",borderRadius:14,padding:"11px 18px",fontWeight:800,fontSize:14,fontFamily:T.fontBody,cursor:"pointer",opacity:loading?0.5:1,flexShrink:0}}>{loading?"…":"Go"}</button>
        </div>

        {/* Filter rows */}
        {/* Service filter */}
        <div style={{marginBottom:10}}>
          <p style={{color:T.muted,fontSize:11,fontWeight:700,fontFamily:T.fontBody,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:7}}>How You Want It</p>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:2}}>
            {SERVICE_OPTIONS.map(s=>(
              <Pill key={s.id} label={s.label} icon={s.icon} selected={serviceFilter.includes(s.id)} onClick={()=>toggleService(s.id)} T={T} accent={T.orange} small/>
            ))}
          </div>
        </div>

        {/* Distance filter — gated for free */}
        <div style={{marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:7}}>
            <p style={{color:T.muted,fontSize:11,fontWeight:700,fontFamily:T.fontBody,textTransform:"uppercase",letterSpacing:"0.08em"}}>Distance {!location&&"(no location)"}</p>
            {!isPro&&<button onClick={()=>onUpgrade("distance_filter")} style={{background:"transparent",border:"none",color:T.orange,fontSize:11,fontWeight:800,fontFamily:T.fontBody,cursor:"pointer"}}>⚡ Pro only</button>}
          </div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:2,opacity:isPro&&location?1:0.4,pointerEvents:isPro&&location?"auto":"none"}}>
            {DISTANCE_OPTIONS.map(opt=>(
              <Pill key={opt.value} label={opt.label} selected={distFilter===opt.value} onClick={()=>setDistFilter(opt.value)} T={T} accent={T.green} small/>
            ))}
          </div>
          {!location&&isPro&&<p style={{color:T.muted,fontSize:11,fontFamily:T.fontBody,marginTop:5}}>📍 Enable location in Profile to use distance filtering</p>}

          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:7}}>
            <p style={{color:T.muted,fontSize:11,fontWeight:700,fontFamily:T.fontBody,textTransform:"uppercase",letterSpacing:"0.08em"}}>Budget</p>
            {!isPro&&<button onClick={()=>onUpgrade("budget_filter")} style={{background:"transparent",border:"none",color:T.orange,fontSize:11,fontWeight:800,fontFamily:T.fontBody,cursor:"pointer"}}>⚡ Pro only</button>}
          </div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:2,opacity:isPro?1:0.4,pointerEvents:isPro?"auto":"none"}}>
            {PRICE_RANGES.map(p=>{const key=`${p.label} ${p.desc}`;return <Pill key={key} label={`${p.label} · ${p.desc}`} selected={priceFilter.includes(key)} onClick={()=>togglePrice(key)} T={T} accent={T.gold} small/>;  })}
          </div>
        </div>
      </div>

      {error&&<div style={{margin:"0 24px 12px",background:T.errBg,border:`1px solid ${T.errBd}`,borderRadius:12,padding:"10px 14px",color:"#FF5555",fontSize:13,fontFamily:T.fontBody}}>{error}</div>}

      {loading?(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",paddingTop:48}}>
          <div style={{width:40,height:40,border:`2px solid ${T.orange}`,borderTopColor:"transparent",borderRadius:"50%",animation:"chewz-spin 0.9s linear infinite",marginBottom:14}}/>
          <p style={{color:T.muted,fontSize:14,fontFamily:T.fontBody}}>Finding your perfect spots…</p>
        </div>
      ):(
        <div style={{padding:"8px 24px 28px"}}>
          {!aiRecs&&profile.favDishes?.length>0&&<p style={{color:T.muted,fontSize:12,fontFamily:T.fontBody,marginBottom:14}}>🍽️ Looking for great: {profile.favDishes.slice(0,3).join(", ")}</p>}
          {restaurants.map((r,i)=>{
            const photos=getPhotos(r.name,r.dish);
            return(
              <div key={i} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:20,marginBottom:14,overflow:"hidden"}}>

                <div style={{padding:"16px"}}>
                  <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <div style={{width:46,height:46,borderRadius:14,background:T.card2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{r.emoji}</div>
                      <div>
                        <h3 style={{fontFamily:T.fontDisplay,fontWeight:900,fontSize:17,color:T.text,letterSpacing:"-0.3px"}}>{r.name}</h3>

                  </div>
                  <div style={{background:T.card2,borderRadius:14,padding:"12px 14px",marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <p style={{color:T.muted,fontSize:10,fontWeight:800,letterSpacing:"0.08em",textTransform:"uppercase",fontFamily:T.fontBody}}>Order This</p>
                      {(r.price||r.approxPrice)&&<span style={{background:`${T.gold}22`,color:T.gold,border:`1px solid ${T.gold}44`,borderRadius:99,padding:"2px 10px",fontSize:11,fontWeight:800,fontFamily:T.fontBody}}>{r.price}{r.approxPrice?` · ${r.approxPrice}`:""}</span>}
                    </div>
                    <p style={{color:T.text,fontWeight:700,fontSize:14,fontFamily:T.fontBody,marginBottom:4}}>{r.dish}</p>
                    <p style={{color:T.subtext,fontSize:12,fontFamily:T.fontBody,lineHeight:1.4}}>{r.reason||r.why}</p>
                  </div>
                  <ServiceBadges services={r.services} T={T}/>
                  <button onClick={()=>setPhotoModal({r:r.name,d:r.dish})} style={{width:"100%",background:"transparent",border:`1.5px solid ${T.border}`,borderRadius:12,padding:"9px",color:T.subtext,fontSize:12,fontWeight:700,fontFamily:T.fontBody,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:10}}>
                    <span>📷</span>{photos.length>0?`${photos.length} photo${photos.length>1?"s":""} · Add yours`:"Add a photo of this dish"}
                  </button>
                </div>
              </div>
            );
          })}
          {!aiRecs&&<button onClick={getAIRecs} style={{width:"100%",background:"transparent",border:`1.5px solid ${T.orange}`,borderRadius:16,padding:"14px",color:T.orange,fontWeight:800,fontSize:14,fontFamily:T.fontBody,cursor:"pointer"}}>✦ Get AI-Personalized Picks</button>}
        </div>
      )}
    </Screen>
  );
}

// ── App Shell ──────────────────────────────────────────────────────────────────
function ChewzApp(){
  const [darkMode,setDarkMode]=useState(true);
  const T=makeTheme(darkMode);
  const [appState,setAppState]=useState("welcome"); // welcome | location | onboarding | main
  const [user,setUser]=useState(null);
  const [screen,setScreen]=useState("discover");
  const [location,setLocation]=useState(null);
  const [paywallOpen,setPaywallOpen]=useState(false);
  const [paywallReason,setPaywallReason]=useState(null);
  const [paywallHighlight,setPaywallHighlight]=useState("pro");

  const handleAuth=({email,name,isNew,plan,scansUsed,profile})=>{
    setUser({email,name,plan,scansUsed,profile});
    if(isNew) setAppState("location");
    else {
      requestBrowserLocation().then(pos=>setLocation(pos)).catch(()=>{});
      setAppState("main");
    }
  };
  const handleLocationAllow=(pos)=>{ setLocation(pos); setAppState("onboarding"); };
  const handleLocationSkip=()=>{ setLocation(null); setAppState("onboarding"); };
  const handleOnboardDone=u=>{ setUser(u); setAppState("main"); };
  const handleSignOut=()=>{ setUser(null); setAppState("welcome"); setScreen("discover"); setLocation(null); };

  const openUpgrade=(reason)=>{
    const map={scan_limit:{h:"pro",m:"You've hit your free scan limit"},macros:{h:"pro",m:"Full nutrition breakdown is a Pro feature"},budget_filter:{h:"pro",m:"Budget filtering is a Pro feature"},distance_filter:{h:"pro",m:"Distance filtering is a Pro feature"},meal_plan:{h:"premium",m:"Meal planning is a Premium feature"}};
    const r=map[reason]||{h:"pro",m:null};
    setPaywallHighlight(r.h);setPaywallReason(r.m);setPaywallOpen(true);
  };

  const requestLocationUpdate=async()=>{
    try{const pos=await requestBrowserLocation();setLocation(pos);}catch{}
  };

  return(
    <div style={{background:"#000",minHeight:"100vh",display:"flex",justifyContent:"center",alignItems:"center"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700;800;900&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{display:none;}
        input::placeholder{color:#555;}
        @keyframes chewz-spin{to{transform:rotate(360deg);}}
        @keyframes chewz-ping{0%{transform:scale(1);opacity:.5}100%{transform:scale(2);opacity:0}}
      `}</style>
      <div style={{width:"min(390px,100vw)",height:"min(844px,100vh)",background:T.bg,borderRadius:window.innerWidth>390?44:0,overflow:"hidden",display:"flex",flexDirection:"column",boxShadow:"0 0 0 1px #1a1a1a,0 40px 100px rgba(0,0,0,0.9)",position:"relative",transition:"background 0.3s"}}>

        {/* Status bar */}
        <div style={{background:T.navBg,padding:"14px 26px 6px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,transition:"background 0.3s"}}>
          <span style={{color:T.text,fontSize:12,fontWeight:700,fontFamily:T.fontBody}}>9:41</span>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {location&&<span style={{color:T.green,fontSize:10,fontWeight:700,fontFamily:T.fontBody}}>📍</span>}
            <span style={{color:T.text,fontSize:12,fontFamily:T.fontBody}}>●●●● WiFi ▓</span>
          </div>
        </div>

        {/* Wordmark */}
        {appState==="main"&&(
          <div style={{padding:"4px 24px 8px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,background:T.navBg,borderBottom:`1px solid ${T.border}`,transition:"background 0.3s"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:30,height:30,borderRadius:9,background:T.orange,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,boxShadow:`0 0 12px ${T.orange}55`}}>🍽️</div>
              <span style={{fontFamily:T.fontDisplay,fontWeight:900,fontSize:22,color:T.text,letterSpacing:"-0.5px"}}>chewz</span>
            </div>
            {user&&<button onClick={()=>openUpgrade("general")} style={{background:"transparent",border:"none",cursor:"pointer",padding:0}}><PlanBadge plan={user.plan||"free"} T={T}/></button>}
          </div>
        )}

        {/* Content */}
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          {appState==="welcome"&&<WelcomeScreen onAuth={handleAuth} T={T}/>}
          {appState==="location"&&<LocationPermissionScreen onAllow={handleLocationAllow} onSkip={handleLocationSkip} T={T}/>}
          {appState==="onboarding"&&<OnboardingScreen user={user} onComplete={handleOnboardDone} T={T}/>}
          {appState==="main"&&(
            <>
              <div style={{flex:1,overflowY:"auto"}}>
                {screen==="discover"&&<DiscoverScreen user={user} T={T} onUpgrade={openUpgrade} location={location}/>}
                {screen==="scan"&&<ScanScreen user={user} setUser={setUser} T={T} onUpgrade={openUpgrade}/>}
                {screen==="profile"&&<ProfileScreen user={user} setUser={setUser} onSignOut={handleSignOut} T={T} darkMode={darkMode} setDarkMode={setDarkMode} onUpgrade={openUpgrade} location={location} onRequestLocation={requestLocationUpdate}/>}
              </div>
              <NavBar active={screen} setScreen={setScreen} T={T}/>
            </>
          )}
        </div>

        {paywallOpen&&user&&<PaywallModal T={T} user={user} setUser={setUser} onClose={()=>setPaywallOpen(false)} highlightPlan={paywallHighlight} reason={paywallReason}/>}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ChewzApp />);
  </script>
</body>
</html>
